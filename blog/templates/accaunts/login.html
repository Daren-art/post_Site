{% extends 'base.html' %}

{% block title %}
Вход
{% endblock %}

{% block content %}

<h1>Вход</h1>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Имя пользователя"
    >

    <input
        type="password"
        name="password"
        placeholder="Пароль"
    >

    <button type="submit">
        Войти
    </button>

</form>

{% endblock %}
