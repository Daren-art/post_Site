<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#fff;
            color:#000;
            font-family:Arial, sans-serif;
            max-width:1000px;
            margin:auto;
            padding:20px;
        }

        nav{
            border-bottom:2px solid #000;
            padding-bottom:15px;
            margin-bottom:30px;
        }

        nav a{
            text-decoration:none;
            color:#000;
            margin-right:20px;
            font-weight:bold;
        }

        nav a:hover{
            text-decoration:underline;
        }

        .card{
            border:2px solid #000;
            padding:20px;
            margin-bottom:20px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px;
            border:2px solid #000;
            margin-bottom:15px;
            background:white;
            color:black;
        }

        button{
            background:black;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
        }

        button:hover{
            background:#333;
        }

        img{
            max-width:100%;
        }

        .comment{
            border-left:3px solid black;
            padding-left:10px;
            margin-top:15px;
        }

        .pagination{
            margin-top:20px;
        }

        .pagination a{
            color:black;
            margin-right:10px;
            text-decoration:none;
            font-weight:bold;
        }

        h1,h2,h3{
            margin-bottom:10px;
        }

        p{
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<nav>
    <a href="{% url 'home' %}">Главная</a>

    {% if user.is_authenticated %}
        <a href="{% url 'create_post' %}">Новая статья</a>
        <a href="{% url 'logout' %}">Выйти</a>
    {% else %}
        <a href="{% url 'login' %}">Войти</a>
        <a href="{% url 'register' %}">Регистрация</a>
    {% endif %}
</nav>

{% block content %}
{% endblock %}

</body>
</html>
